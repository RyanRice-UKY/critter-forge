<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Critter Forge — Act 1</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
  </head>
  <body>
    <header>
      <h1>🦎 Critter Forge <span class="act">Act 1 · Survival</span></h1>
      <p class="tag">Write real Python. Watch your critter live or die. <strong>sense → decide → act.</strong></p>
    </header>

    <div id="tabs" class="tabs"></div>

    <main>
      <section class="left">
        <div class="panel">
          <div class="panel-head">
            <h2 id="levelName">Loading…</h2>
            <div class="chips">
              <span class="modechip" id="modechip"></span>
              <span class="conceptchip">New: <b id="concept"></b></span>
            </div>
          </div>
          <p id="blurb" class="blurb"></p>
        </div>
        <div id="editor" class="editor"></div>
        <div class="controls">
          <button id="run" class="primary" disabled>▶ Run</button>
          <button id="reset" class="ghost">↺ Reset code</button>
        </div>
        <div id="status" class="status muted">Booting…</div>
        <div id="grade" class="grade"></div>
      </section>

      <section class="right">
        <canvas id="canvas" width="484" height="484"></canvas>
        <div id="growth" class="growth"></div>
      </section>
    </main>

    <div id="toast" class="toast"></div>

    <script type="module" src="./game.js"></script>
  </body>
</html>
